<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Agente IA</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app">

<header class="topbar">

<h1>🤖 Agente IA</h1>

<div class="controls">

<textarea id="personality" placeholder="Personalidad del bot"></textarea>

<button onclick="setPersonality()">Guardar personalidad</button>

<label class="fileBtn">
Seleccionar archivo
<input type="file" id="fileInput">
</label>

<button onclick="uploadFile()">Subir archivo</button>

</div>

</header>

<div id="chat"></div>

<div class="inputBar">

<input id="message" placeholder="Escribí un mensaje...">

<button onclick="sendMessage()">Enviar</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
