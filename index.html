<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Agente IA</h1>

<div class="controls">

<textarea id="personality" placeholder="Personalidad del bot"></textarea>
<button onclick="setPersonality()">Guardar personalidad</button>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Subir archivo</button>

</div>

<div id="chat"></div>

<div class="messageBox">
<input type="text" id="message" placeholder="Escribí un mensaje">
<button onclick="sendMessage()">Enviar</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
