<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agente IA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<div class="users">
<h3>Usuarios</h3>
<div id="usersList"></div>
</div>

<div class="chatSection">

<div class="chatHeader">
<h2 id="username"></h2>
</div>

<div id="chat"></div>

<div class="inputBar">

<input id="message" placeholder="Escribí un mensaje">

<button onclick="sendMessage()">Enviar</button>

<button onclick="deleteMyChat()">Borrar chat</button>

</div>

</div>

<div class="mirror">

<h3>Vista de otro usuario</h3>

<div id="mirrorChat"></div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
