<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar usuarios -->
  <aside class="users-panel">
    <div class="panel-header">
      <span class="panel-label">USUARIOS</span>
      <span class="online-badge" id="onlineCount">0 en línea</span>
    </div>
    <div id="usersList"></div>
  </aside>

  <!-- Chat principal -->
  <main class="chat-section">

    <header class="chat-header">
      <div class="header-left">
        <div class="avatar-dot"></div>
        <div>
          <div class="header-name" id="username"></div>
          <div class="header-sub" id="myStatus">Agente IA · activo</div>
        </div>
      </div>
      <div class="header-actions">
        <select id="personality" class="personality-select">
          <option value="normal">Normal</option>
          <option value="analyst">Analista</option>
          <option value="creative">Creativo</option>
          <option value="strict">Estricto</option>
          <option value="dev">Dev</option>
          <option value="coach">Coach</option>
          <option value="custom">✦ Personalizada</option>
        </select>
        <button class="btn-icon" onclick="openPersonalityModal()" title="Editar personalidad">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        </button>
        <button class="btn-ghost" onclick="deleteMyChat()" title="Borrar chat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
        </button>
      </div>
    </header>

    <div id="chat" class="chat-messages"></div>

    <footer class="input-area">
      <div class="upload-row">
        <label class="file-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          Adjuntar
          <input type="file" id="fileUpload" onchange="uploadFile()" accept=".txt,.csv,.jpg,.jpeg,.png,.xlsx,.xls">
        </label>
        <span class="file-name" id="fileName">Sin archivo</span>
      </div>
      <div class="message-row">
        <textarea id="message" placeholder="Escribí un mensaje..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
        </button>
      </div>
    </footer>

  </main>

  <!-- Panel espejo -->
  <aside class="mirror-panel">
    <div class="panel-header">
      <span class="panel-label">VISTA ESPEJO</span>
      <div class="mirror-actions">
        <button class="btn-ask-about" onclick="askAboutUser()" title="Preguntar sobre este usuario en tu chat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Preguntar
        </button>
        <button class="btn-join" onclick="joinChat()">Unirme</button>
      </div>
    </div>
    <div class="mirror-empty" id="mirrorEmpty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <p>Seleccioná un usuario para ver su chat</p>
    </div>
    <div id="mirrorChat"></div>
  </aside>

</div>

<!-- Modal personalidad -->
<div class="modal-overlay" id="personalityModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Personalidad del agente</span>
      <button class="modal-close" onclick="closePersonalityModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">Escribí una personalidad completamente personalizada. Cuando esté definida, el selector del chat usará esta en lugar del preset.</p>
      <textarea id="customPersonality" class="personality-editor" placeholder="Ejemplo: Sos un asistente especializado en marketing digital para startups. Respondés siempre con bullet points, priorizás el ROI y usás tono profesional pero directo..."></textarea>
      <div class="modal-presets">
        <span class="modal-preset-label">O cargá un preset como base:</span>
        <div class="preset-chips" id="presetChips"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="clearPersonality()">Limpiar</button>
      <button class="btn-primary" onclick="savePersonality()">Guardar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
